<section
  class="home-tour-section"
  [ngClass]="{
    'home-tour-section--highlight': variant === 'highlight',
    'home-tour-section--compact': variant === 'compact'
  }"
>
  <div class="home-tour-section__header">
    <div class="home-tour-section__intro">
      <h2 class="home-tour-section__title">{{ title }}</h2>

      <p class="home-tour-section__subtitle" *ngIf="subtitle">
        {{ subtitle }}
      </p>
    </div>

    <a
      class="home-tour-section__more"
      *ngIf="showViewMore"
      [routerLink]="viewMoreLink"
    >
      Xem tất cả
    </a>
  </div>

  <div class="home-tour-section__grid" *ngIf="tours.length; else emptyTours">
    <app-tour-card
      *ngFor="let tour of tours"
      [tour]="tour"
      [showWishlist]="showWishlist"
      [isWishlisted]="isTourWishlisted(tour)"
      (wishlistToggle)="wishlistToggle.emit($event)"
    />
  </div>

  <ng-template #emptyTours>
    <div class="home-tour-section__empty">
      Chưa có tour phù hợp để hiển thị.
    </div>
  </ng-template>
</section>
