<section class="home">
  <section class="home-hero">
    <div class="home-hero__background"></div>

    <div class="vv-container home-hero__container">
      <div class="home-hero__nav" (mouseleave)="setActiveSidebarMenu(null)">
        <aside class="home-hero__sidebar">
          <button
            *ngFor="let item of sidebarItems"
            class="home-hero__sidebar-item"
            [class.home-hero__sidebar-item--active]="activeSidebarMenu() === item.id"
            [class.home-hero__sidebar-item--visa]="item.id === 'visa'"
            type="button"
            (mouseenter)="setActiveSidebarMenu(item.id)"
            (focus)="setActiveSidebarMenu(item.id)"
          >
            <img class="home-hero__sidebar-icon" [src]="item.iconUrl" [alt]="item.label" />
            <span class="home-hero__sidebar-label">
              {{ item.label }}
            </span>
          </button>
        </aside>

        <div
          class="home-hero__mega"
          [ngClass]="'home-hero__mega--' + activeMenu"
          *ngIf="activeSidebarMenu() as activeMenu"
        >
          <div class="home-hero__mega-grid" [ngClass]="'home-hero__mega-grid--' + activeMenu">
            <section *ngFor="let column of megaMenus[activeMenu]" class="home-hero__mega-column">
              <h3 class="home-hero__mega-title">{{ column.title }}</h3>
              <a *ngFor="let link of column.links" class="home-hero__mega-link" routerLink="/tours">
                {{ link }}
              </a>
            </section>
          </div>
        </div>
      </div>

      <div class="home-hero__content">
        <h1 class="home-hero__title">Du lịch Châu Á - Khám phá Mỹ, Úc, Âu. Đi nơi đâu bạn muốn</h1>
        <p class="home-hero__description">
          Khám phá các hành trình trong nước và quốc tế với ưu đãi tốt nhất từ VoyageViet.
        </p>

        <div class="home-search">
          <div class="home-search__row home-search__row--top">
            <div
              class="home-search__dest-wrap"
              [class.home-search__dest-wrap--open]="destDropdownOpen"
            >
              <button
                type="button"
                class="home-search__dest-trigger"
                (click)="destDropdownOpen = !destDropdownOpen"
                [attr.aria-expanded]="destDropdownOpen"
              >
                <svg
                  class="home-search__dest-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
                  />
                  <circle cx="12" cy="9" r="2.5" />
                </svg>
                <span
                  class="home-search__dest-value"
                  [class.home-search__dest-value--placeholder]="!selectedDestination"
                >
                  {{ selectedDestination ? selectedDestination.name : 'Bạn muốn đi đâu?' }}
                </span>
                <button
                  *ngIf="selectedDestination"
                  type="button"
                  class="home-search__clear-btn"
                  aria-label="Xóa địa điểm"
                  (click)="clearDestination($event)"
                >
                  ×
                </button>
                <svg
                  class="home-search__dest-chevron"
                  [class.home-search__dest-chevron--open]="destDropdownOpen"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polyline points="6 9 12 15 18 9" />
                </svg>
              </button>
              <div class="home-search__dest-panel" *ngIf="destDropdownOpen">
                <div class="home-search__dest-header">
                  <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                    <path
                      d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
                    />
                  </svg>
                  <span>Địa Điểm Hot</span>
                </div>
                <div class="home-search__dest-grid">
                  <button
                    *ngFor="let item of hotDestinations"
                    type="button"
                    class="home-search__dest-item"
                    (click)="selectedDestination = item; destDropdownOpen = false"
                  >
                    <img [src]="item.imageUrl" [alt]="item.name" />
                    <span>
                      <strong>{{ item.name }}</strong>
                      <small>{{ item.tourCount }} tours</small>
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="home-search__row home-search__row--bottom">
            <div class="home-search__field-wrap">
              <button
                tuiButton
                appearance="custom"
                size="l"
                type="button"
                class="home-search__guest-trigger"
                [tuiDropdown]="guestDropdown"
                [(tuiDropdownOpen)]="guestDropdownOpen"
                [tuiDropdownDirection]="'bottom'"
                [tuiDropdownLimitWidth]="'fixed'"
                [tuiDropdownOffset]="8"
              >
                <tui-icon icon="@tui.user" class="home-search__guest-icon" />
                <span
                  class="home-search__field-text"
                  [class.home-search__field-text--placeholder]="
                    adultCount === 0 && childCount === 0
                  "
                >
                  {{ guestLabel }}
                </span>
                <button
                  *ngIf="adultCount > 0 || childCount > 0"
                  type="button"
                  class="home-search__clear-btn"
                  aria-label="Xóa số lượng"
                  (click)="clearGuests($event)"
                >
                  ×
                </button>
                <tui-icon
                  icon="@tui.chevron-down"
                  class="home-search__chevron-icon"
                  [class.home-search__chevron-icon--open]="guestDropdownOpen"
                />
              </button>

              <ng-template #guestDropdown>
                <div class="home-search__guest-panel" (click)="$event.stopPropagation()">
                  <div class="home-search__guest-head">
                    <tui-icon icon="@tui.user" class="home-search__guest-head-icon" />
                    <span class="home-search__guest-head-text">{{ guestTitle }}</span>
                  </div>

                  <div class="home-search__guest-row">
                    <span class="home-search__guest-label">Người lớn</span>
                    <div class="home-search__guest-actions">
                      <button
                        type="button"
                        class="home-search__guest-btn"
                        [disabled]="adultCount <= 0"
                        (click)="decreaseAdult()"
                      >
                        -
                      </button>
                      <strong class="home-search__guest-count">{{ adultCount }}</strong>
                      <button
                        type="button"
                        class="home-search__guest-btn"
                        (click)="increaseAdult()"
                      >
                        +
                      </button>
                    </div>
                  </div>

                  <div class="home-search__guest-row">
                    <span class="home-search__guest-label">Trẻ em</span>
                    <div class="home-search__guest-actions">
                      <button
                        type="button"
                        class="home-search__guest-btn"
                        [disabled]="childCount <= 0"
                        (click)="decreaseChild()"
                      >
                        -
                      </button>
                      <strong class="home-search__guest-count">{{ childCount }}</strong>
                      <button
                        type="button"
                        class="home-search__guest-btn"
                        (click)="increaseChild()"
                      >
                        +
                      </button>
                    </div>
                  </div>
                </div>
              </ng-template>
            </div>

            <div
              tuiDropdown
              role="button"
              tabindex="0"
              class="home-search__date-trigger home-search__date-wrap"
              [(tuiDropdownOpen)]="dateDropdownOpen"
              [tuiDropdownDirection]="'bottom'"
              [tuiDropdownLimitWidth]="'auto'"
              [tuiDropdownMaxHeight]="520"
              [tuiDropdownOffset]="8"
            >
              <tui-icon icon="@tui.calendar" class="home-search__date-icon" />
              <span
                class="home-search__field-text"
                [class.home-search__field-text--placeholder]="!departureDate"
              >
                {{ departureDateLabel }}
              </span>
              <button
                *ngIf="departureDate"
                type="button"
                class="home-search__clear-btn"
                aria-label="Xóa ngày đi"
                (click)="clearDepartureDate($event)"
              >
                ×
              </button>
              <tui-icon
                icon="@tui.chevron-down"
                class="home-search__chevron-icon"
                [class.home-search__chevron-icon--open]="dateDropdownOpen"
              />
              <tui-calendar
                *tuiDropdown
                class="home-search__calendar"
                [(value)]="departureDate"
                (dayClick)="selectDepartureDate($event)"
              />
            </div>
            <button type="button" class="home-search__submit">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="16"
                height="16"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <span>Tìm kiếm</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
</section>
