<section class="forgot-password">
  <div class="forgot-password__container">
    <nav class="forgot-password__breadcrumb">
      <a routerLink="/">HOME</a>
      <span>QUÊN MẬT KHẨU</span>
    </nav>

    <form class="forgot-password__card" [formGroup]="form" (ngSubmit)="submit()">
      <p class="forgot-password__eyebrow">VoyageViet</p>
      <h1 class="forgot-password__title">Quên mật khẩu</h1>
      <p class="forgot-password__subtitle">
        Nhập email tài khoản VoyageViet để nhận hướng dẫn đặt lại mật khẩu.
      </p>

      <div class="forgot-password__form">
        <div class="forgot-password__field">
          <label for="forgot-email">Email</label>
          <input
            id="forgot-email"
            type="email"
            formControlName="email"
            placeholder="user@gmail.com"
          />

          <small *ngIf="form.controls.email.touched && form.controls.email.invalid">
            Email không hợp lệ.
          </small>
        </div>

        <div class="forgot-password__message forgot-password__message--success" *ngIf="successMessage()">
          {{ successMessage() }}
        </div>

        <div class="forgot-password__message forgot-password__message--error" *ngIf="errorMessage()">
          {{ errorMessage() }}
        </div>

        <div class="forgot-password__actions">
          <button type="submit" [disabled]="loading()">
            {{ loading() ? 'Đang gửi...' : 'Gửi yêu cầu' }}
          </button>
          <a routerLink="/login">Quay lại đăng nhập</a>
        </div>
      </div>
    </form>
  </div>
</section>
