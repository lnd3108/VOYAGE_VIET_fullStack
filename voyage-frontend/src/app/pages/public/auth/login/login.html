<section class="auth">
  <div class="auth__shell">
    <div class="auth__visual">
      <p class="auth__eyebrow">VoyageViet</p>

      <h1 class="auth__hero-title">
        Khám phá hành trình mới cùng VoyageViet
      </h1>

      <p class="auth__hero-desc">
        Đăng nhập để đặt tour, theo dõi booking và nhận ưu đãi du lịch mới nhất.
      </p>
    </div>

    <form class="auth__card" [formGroup]="form" (ngSubmit)="submit()">
      <p class="auth__eyebrow">Đăng nhập</p>

      <h2 class="auth__title">Chào mừng trở lại</h2>

      <p class="auth__desc">
        Nhập tài khoản của bạn để tiếp tục.
      </p>

      <div class="auth__field">
        <label class="auth__label" for="email">Email</label>
        <input
          id="email"
          class="auth__input"
          type="email"
          formControlName="email"
          placeholder="user@gmail.com"
        />

        <small
          class="auth__error"
          *ngIf="form.controls.email.touched && form.controls.email.invalid"
        >
          Email không hợp lệ.
        </small>
      </div>

      <div class="auth__field">
        <label class="auth__label" for="password">Mật khẩu</label>
        <input
          id="password"
          class="auth__input"
          type="password"
          formControlName="password"
          placeholder="Nhập mật khẩu"
        />

        <small
          class="auth__error"
          *ngIf="form.controls.password.touched && form.controls.password.invalid"
        >
          Vui lòng nhập mật khẩu.
        </small>
      </div>

      <div class="auth__alert auth__alert--error" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <button class="auth__button" type="submit" [disabled]="loading()">
        {{ loading() ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>

      <p class="auth__switch">
        Chưa có tài khoản?
        <a routerLink="/register">Đăng ký ngay</a>
      </p>
    </form>
  </div>
</section>
