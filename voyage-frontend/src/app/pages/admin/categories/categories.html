<section class="admin-categories">
  <header class="admin-categories__header">
    <div class="admin-categories__title-block">
      <nav class="admin-categories__breadcrumb" aria-label="Breadcrumb">
        <span>Nội dung</span>
        <span class="admin-categories__breadcrumb-separator">›</span>
        <span *ngIf="isFormOpen">Danh mục</span>
        <span class="admin-categories__breadcrumb-separator" *ngIf="isFormOpen">›</span>
        <strong>{{ pageTrailLabel }}</strong>
      </nav>

      <p>{{ pageDescription }}</p>
    </div>

    <div class="admin-categories__actions" *ngIf="!isFormOpen">
      <button
        type="button"
        class="admin-categories__button admin-categories__button--primary"
        *ngIf="canCreateCategory()"
        (click)="openCreateForm()"
      >
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
          <path d="M12 5v14" />
          <path d="M5 12h14" />
        </svg>
        Thêm danh mục
      </button>
    </div>
  </header>

  <div class="admin-categories__notice" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <div class="admin-categories__error" *ngIf="errorMessage">
    <p>{{ errorMessage }}</p>

    <button
      type="button"
      class="admin-categories__button admin-categories__button--danger-soft admin-categories__button--sm"
      *ngIf="!loading && !isFormOpen"
      (click)="loadCategories()"
    >
      Thử lại
    </button>
  </div>

  <app-admin-category-form
    *ngIf="isFormOpen"
    [selectedCategory]="selectedCategory"
    [mode]="formMode"
    [nextDisplayOrder]="nextDisplayOrder"
    (saved)="handleFormSaved()"
    (closed)="closeForm()"
  />

  <ng-container *ngIf="!isFormOpen">
    <app-admin-category-filter
      [keyword]="filterKeywordDraft"
      [statusFilter]="filterStatusDraft"
      [statusFilters]="statusFilters"
      [filteredCount]="filteredCategories.length"
      [totalCount]="categories.length"
      [disabled]="loading"
      (keywordChange)="onFilterKeywordDraftChange($event)"
      (statusFilterChange)="onFilterStatusDraftChange($event)"
      (searchRequested)="searchCategories()"
      (clearRequested)="clearFilters()"
    />

    <section class="admin-categories__grid-card">
      <div class="admin-categories__list-head">
        <div class="admin-categories__list-title">
          <h2>Danh sách bản ghi</h2>
          <span>{{ filteredCategories.length }}</span>
        </div>
      </div>

      <app-admin-category-bulk-actions
        *ngIf="selectedBatchCount > 0"
        [selectedCategories]="selectedBatchCategories"
        (completed)="handleChildCompleted()"
        (clearSelectionRequested)="clearBatchSelection()"
      />

      <app-admin-category-table
        [categories]="filteredCategories"
        [loading]="loading"
        [context]="tableContext"
        [reorderBlockedByFilter]="reorderBlockedByFilter"
        [reorderingCategoryIds]="reorderingCategoryIds"
        [showReorderNote]="reorderBlockedByFilter || gridSortBlocksReorder"
        (selectionChanged)="onTableSelectionChanged($event)"
        (sortBlockedChange)="onSortBlockedChange($event)"
      />
    </section>
  </ng-container>

  <app-admin-category-detail-panel
    *ngIf="reviewCategory"
    [category]="reviewCategory"
    (completed)="handleChildCompleted()"
    (closed)="closePendingChangesPanel()"
  />
</section>
