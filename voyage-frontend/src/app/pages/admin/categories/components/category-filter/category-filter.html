<section class="admin-category-filter">
  <label class="admin-category-filter__field">
    <span class="admin-category-filter__label">Tên danh mục</span>

    <input
      type="search"
      class="admin-category-filter__input"
      [value]="keyword"
      [disabled]="disabled"
      placeholder="Tìm theo tên hoặc slug"
      (input)="updateKeyword($event)"
      (keydown.enter)="requestSearch()"
    />
  </label>

  <label class="admin-category-filter__field">
    <span class="admin-category-filter__label">Trạng thái</span>

    <div
      class="admin-category-filter__select"
      [class.admin-category-filter__select--open]="isStatusOpen"
    >
      <button
        type="button"
        class="admin-category-filter__select-trigger"
        [disabled]="disabled"
        (click)="toggleStatusSelect($event)"
      >
        <span>{{ selectedStatusLabel }}</span>

        <tui-icon class="admin-category-filter__select-icon" icon="@tui.chevron-down" />
      </button>

      <div class="admin-category-filter__select-menu" *ngIf="isStatusOpen">
        <button
          type="button"
          class="admin-category-filter__select-option"
          *ngFor="let option of visibleStatusFilters"
          [class.admin-category-filter__select-option--selected]="statusFilter === option.value"
          (click)="selectStatus(option.value)"
        >
          {{ option.label }}
        </button>
      </div>
    </div>
  </label>

  <div class="admin-category-filter__actions">
    <button
      type="button"
      class="admin-category-filter__button admin-category-filter__button--secondary"
      [disabled]="disabled || !hasActiveDraftFilter"
      (click)="requestClear()"
    >
      <tui-icon class="admin-category-filter__button-icon" icon="@tui.rotate-ccw" />
      <span>Xóa bộ lọc</span>
    </button>

    <button
      type="button"
      class="admin-category-filter__button admin-category-filter__button--primary"
      [disabled]="disabled"
      (click)="requestSearch()"
    >
      <tui-icon class="admin-category-filter__button-icon" icon="@tui.search" />
      <span>Tìm kiếm</span>
    </button>
  </div>
</section>
