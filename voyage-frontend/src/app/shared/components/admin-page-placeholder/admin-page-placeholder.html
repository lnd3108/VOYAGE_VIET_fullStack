<section class="admin-page">
  <article class="admin-page__card">
    <p class="admin-page__eyebrow">
      {{ eyebrow }}
    </p>

    <h1 class="admin-page__title">
      {{ title }}
    </h1>

    <p class="admin-page__desc">
      {{ description }}
    </p>

    <div class="admin-page__meta">
      <span class="admin-page__badge admin-page__badge--primary">
        {{ primaryBadge }}
      </span>

      <span class="admin-page__badge">
        {{ secondaryBadge }}
      </span>
    </div>

    <div class="admin-page__status">
      {{ status }}
    </div>
  </article>
</section>
