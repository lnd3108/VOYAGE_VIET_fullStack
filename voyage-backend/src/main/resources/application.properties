spring.application.name=voyage-backend
server.port=8081
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.profiles.active=local

spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# ===============================
# JWT CONFIG
# ===============================
app.jwt.secret=${JWT_SECRET:VoyageVietSecretKeyForJwtAuthenticationMustBeAtLeast32Bytes}
app.jwt.access-token-expiration-ms=86400000

# ===============================
# LOCAL SEED CONFIG
# ===============================
app.seed.admin.enabled=true
app.seed.admin.email=admin@voyageviet.local
app.seed.admin.password=Admin@123456

app.seed.super-admin.email=superadmin@voyageviet.local
app.seed.super-admin.password=SuperAdmin@123456

# ===============================
# SAMPLE DATA SEED CONFIG
# ===============================
app.seed.sample.enabled=true

# ===============================
# CLOUDINARY CONFIG
# ===============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.folder=${CLOUDINARY_FOLDER:voyage-viet}

# ===============================
# PAYMENT / VNPAY CONFIG
# ===============================
payment.mock-enabled=${PAYMENT_MOCK_ENABLED:false}

vnpay.enabled=${VNPAY_ENABLED:false}
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:}
vnpay.return-url=${VNPAY_RETURN_URL:}
vnpay.ipn-url=${VNPAY_IPN_URL:}
vnpay.api-url=${VNPAY_API_URL:}
vnpay.version=${VNPAY_VERSION:2.1.0}
vnpay.command=${VNPAY_COMMAND:pay}
vnpay.curr-code=${VNPAY_CURR_CODE:VND}
vnpay.locale=${VNPAY_LOCALE:vn}
vnpay.order-type=${VNPAY_ORDER_TYPE:other}
vnpay.refund-enabled=${VNPAY_REFUND_ENABLED:false}

# ===============================
# BOOKING EXPIRY CONFIG
# ===============================
booking.expiry.enabled=${BOOKING_EXPIRY_ENABLED:true}
booking.expiry.pending-timeout-minutes=${BOOKING_EXPIRY_PENDING_TIMEOUT_MINUTES:30}
booking.expiry.fixed-rate-ms=${BOOKING_EXPIRY_FIXED_RATE_MS:60000}
booking.expiry.batch-size=${BOOKING_EXPIRY_BATCH_SIZE:100}

# ===============================
# MAIL CONFIG
# ===============================
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:no-reply@voyageviet.local}
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}
